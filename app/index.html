<title>지방세법 · O/X 학습 퀴즈</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    min-height: 100vh;
    background: #EEF1F6;
    font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: #1A1D24;
  }
  button { font-family: inherit; }

  @keyframes popIn { 0% { transform: scale(.8); opacity: 0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* tap / active feedback — mirrors the design's style-active declarations */
  .a-scale985:active { transform: scale(.985); }
  .a-scale99:active  { transform: scale(.99); }
  .a-scale98:active  { transform: scale(.98); }
  .a-theory:active   { background: #ECE9FC !important; }
  .a-ox-o:active     { border-color: #2563EB !important; background: #F4F8FF !important; }
  .a-ox-x:active     { border-color: #EF4444 !important; background: #FEF4F4 !important; }
</style>
</head>
